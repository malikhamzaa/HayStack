<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132042"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F2A93B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F2A93B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bgGrad)"/>
  <circle cx="1000" cy="90" r="220" fill="url(#glow)"/>

  <!-- abstract node graph motif, drawn from scratch -->
  <g stroke="#3A4A6E" stroke-width="2" fill="none" opacity="0.9">
    <path d="M 60 230 L 150 190 L 250 220 L 340 170 L 430 200"/>
    <path d="M 150 190 L 150 130"/>
    <path d="M 250 220 L 250 260"/>
    <path d="M 340 170 L 340 110"/>
  </g>
  <g fill="#F2A93B">
    <circle cx="60" cy="230" r="6"/>
    <circle cx="150" cy="190" r="6"/>
    <circle cx="150" cy="130" r="5"/>
    <circle cx="250" cy="220" r="6"/>
    <circle cx="250" cy="260" r="5"/>
    <circle cx="340" cy="170" r="6"/>
    <circle cx="340" cy="110" r="5"/>
    <circle cx="430" cy="200" r="6"/>
  </g>

  <!-- wordmark -->
  <text x="480" y="150" font-size="64" font-weight="700" fill="#FFFFFF">Haystack</text>
  <text x="480" y="188" font-size="20" fill="#C9D2E3">Compose retrieval, reasoning, and generation into systems you can trust</text>

  <!-- small tag row -->
  <g font-size="13" fill="#8FA0C4">
    <rect x="480" y="210" width="86" height="26" rx="13" fill="#22315A"/>
    <text x="523" y="227" text-anchor="middle">pipelines</text>

    <rect x="576" y="210" width="70" height="26" rx="13" fill="#22315A"/>
    <text x="611" y="227" text-anchor="middle">agents</text>

    <rect x="656" y="210" width="94" height="26" rx="13" fill="#22315A"/>
    <text x="703" y="227" text-anchor="middle">retrieval</text>

    <rect x="760" y="210" width="106" height="26" rx="13" fill="#22315A"/>
    <text x="813" y="227" text-anchor="middle">any LLM vendor</text>
  </g>
</svg>
