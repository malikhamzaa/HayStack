<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6F7FB"/>
    </linearGradient>
  </defs>

  <!-- connector lines from center to each card -->
  <g stroke="#F2A93B" stroke-width="2">
    <line x1="450" y1="240" x2="450" y2="120"/>
    <line x1="450" y1="240" x2="220" y2="150"/>
    <line x1="450" y1="240" x2="680" y2="150"/>
    <line x1="450" y1="240" x2="220" y2="340"/>
    <line x1="450" y1="240" x2="680" y2="340"/>
    <line x1="450" y1="240" x2="450" y2="380"/>
  </g>

  <!-- center hub -->
  <g>
    <circle cx="450" cy="240" r="75" fill="#1B2A4A"/>
    <text x="450" y="232" text-anchor="middle" font-size="34">🌾</text>
    <text x="450" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Haystack Core</text>
  </g>

  <!-- Card: LLM Providers -->
  <g transform="translate(330,40)">
    <rect width="240" height="80" rx="14" fill="url(#cardGrad)" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="120" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1B2A4A">LLM &amp; Embedding Providers</text>
    <text x="120" y="54" text-anchor="middle" font-size="11.5" fill="#5A6478">OpenAI · Anthropic · Cohere</text>
    <text x="120" y="70" text-anchor="middle" font-size="11.5" fill="#5A6478">Hugging Face · Bedrock · local</text>
  </g>

  <!-- Card: Document Stores -->
  <g transform="translate(30,110)">
    <rect width="220" height="80" rx="14" fill="url(#cardGrad)" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1B2A4A">Document Stores</text>
    <text x="110" y="54" text-anchor="middle" font-size="11.5" fill="#5A6478">Elasticsearch · OpenSearch</text>
    <text x="110" y="70" text-anchor="middle" font-size="11.5" fill="#5A6478">Weaviate · Qdrant · pgvector</text>
  </g>

  <!-- Card: Tools & Agents -->
  <g transform="translate(650,110)">
    <rect width="220" height="80" rx="14" fill="url(#cardGrad)" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1B2A4A">Agents &amp; Tools</text>
    <text x="110" y="54" text-anchor="middle" font-size="11.5" fill="#5A6478">Function calling · MCP</text>
    <text x="110" y="70" text-anchor="middle" font-size="11.5" fill="#5A6478">Lifecycle hooks · memory</text>
  </g>

  <!-- Card: Retrievers & Rankers -->
  <g transform="translate(30,300)">
    <rect width="220" height="80" rx="14" fill="url(#cardGrad)" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1B2A4A">Retrieval &amp; Ranking</text>
    <text x="110" y="54" text-anchor="middle" font-size="11.5" fill="#5A6478">BM25 · dense · hybrid</text>
    <text x="110" y="70" text-anchor="middle" font-size="11.5" fill="#5A6478">Rerankers · samplers</text>
  </g>

  <!-- Card: Integrations -->
  <g transform="translate(650,300)">
    <rect width="220" height="80" rx="14" fill="url(#cardGrad)" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1B2A4A">Community Integrations</text>
    <text x="110" y="54" text-anchor="middle" font-size="11.5" fill="#5A6478">haystack-core-integrations</text>
    <text x="110" y="70" text-anchor="middle" font-size="11.5" fill="#5A6478">Hayhooks · Agent Pack</text>
  </g>

  <!-- Card: Deployment -->
  <g transform="translate(330,380)">
    <rect width="240" height="80" rx="14" fill="url(#cardGrad)" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="120" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1B2A4A">Deploy Anywhere</text>
    <text x="120" y="54" text-anchor="middle" font-size="11.5" fill="#5A6478">REST APIs · MCP servers</text>
    <text x="120" y="70" text-anchor="middle" font-size="11.5" fill="#5A6478">Docker · cloud · on-prem</text>
  </g>
</svg>
